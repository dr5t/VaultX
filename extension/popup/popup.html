<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }
    .logo {
      background: #6366f1;
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }
    .title {
      font-weight: 700;
      font-size: 1.2rem;
    }
    .cred-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cred-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: #6366f1;
    }
    .cred-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .cred-user {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    #login-form {
      display: none;
    }
    #cred-list {
      display: none;
    }
    .status {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <div class="title">VaultX</div>
  </div>

  <div id="loading" class="status">Connecting to vault...</div>

  <div id="login-form">
    <div style="margin-bottom: 15px;">
      <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px;">Please log in to your VaultX dashboard first.</p>
      <button id="open-vault" class="btn">Open Dashboard</button>
    </div>
  </div>

  <div id="cred-list">
    <p id="match-status" style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px;">Matching credentials:</p>
    <div id="items-container"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
