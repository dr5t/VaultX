<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultX Extension</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }
    .logo {
      background: #6366f1;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .title {
      font-weight: 700;
      font-size: 1.2rem;
    }
    .status {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .form-container {
      margin-bottom: 15px;
    }
    .description {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .cred-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .cred-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: #6366f1;
      transform: translateY(-1px);
    }
    .cred-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: #f8fafc;
    }
    .cred-user {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #4f46e5;
    }
    #login-form, #cred-list {
      display: none;
    }
    #items-container {
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <div class="title">VaultX</div>
  </div>

  <div id="loading" class="status">Connecting to vault...</div>

  <div id="login-form">
    <div class="form-container">
      <p class="description">Please log in to your VaultX dashboard first to access your credentials.</p>
      <button id="open-vault" class="btn">Open Dashboard</button>
    </div>
  </div>

  <div id="cred-list">
    <p class="description">Matching credentials found for this site:</p>
    <div id="items-container"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
